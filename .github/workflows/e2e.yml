name: E2E

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autocontrol
          POSTGRES_PASSWORD: autocontrol_dev
          POSTGRES_DB: autocontrol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autocontrol"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: 'true'
      NODE_ENV: test
      DATABASE_URL: postgresql://autocontrol:autocontrol_dev@localhost:5432/autocontrol_test
      TEST_DATABASE_URL: postgresql://autocontrol:autocontrol_dev@localhost:5432/autocontrol_test
      JWT_SECRET: ci-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: ci-jwt-refresh-not-for-production
      ADMIN_EMAIL: admin@autocontrol.co
      ADMIN_PASSWORD: Admin1234!
      ADMIN_PIN: '1234'
      PORT: '4000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root deps (Playwright + pg)
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Apply Prisma migrations on test DB
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Seed admin user
        working-directory: backend
        run: node scripts/seed.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (failure traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
