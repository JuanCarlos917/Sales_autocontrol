version: '3.8'

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: autocontrol_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autocontrol_db
      POSTGRES_USER: autocontrol
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocontrol -d autocontrol_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autocontrol_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://autocontrol:${DB_PASSWORD:-your_secure_password}@db:5432/autocontrol_db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: autocontrol_frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  # ── Nginx Proxy ──
  nginx:
    image: nginx:alpine
    container_name: autocontrol_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/autocontrol.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  uploads_data:
